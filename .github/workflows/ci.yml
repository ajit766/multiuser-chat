name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-lint-test:
    name: lint+test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - auth-service
          - message-service
          - presence-service
          - gateway-service
          - delivery-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  backend-docker-build:
    name: docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - auth-service
          - message-service
          - presence-service
          - gateway-service
          - delivery-service
    steps:
      - uses: actions/checkout@v4
      # Builds from requirements.txt (production deps only), not
      # requirements-dev.txt - catches a runtime dependency that tests
      # only exercise via the dev requirements file, which the lint+test
      # job above would silently miss. Bit us for real once already.
      - name: Build image
        run: docker build ./services/${{ matrix.service }}

  nginx-docker-build:
    name: docker build (nginx + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f nginx/Dockerfile .

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check and build
        run: npm run build
