worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile on;

    # Docker's embedded DNS. Using a variable in proxy_pass below (instead
    # of a static `upstream {}` block) forces nginx to re-resolve each
    # container hostname on every request instead of caching the IP from
    # nginx startup - otherwise a recreated backend container (redeploy,
    # crash restart) silently breaks routing until nginx itself restarts.
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;

        # /internal/* routes on each service are never proxied here on
        # purpose - they're only reachable service-to-service over the
        # Docker network, plus they require X-Internal-Api-Key as
        # defense in depth.

        location /auth/ {
            set $upstream http://auth-service:8000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /users {
            set $upstream http://user-service:8000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /messages {
            set $upstream http://message-service:8000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ws {
            set $upstream http://gateway-service:8000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }
    }
}
