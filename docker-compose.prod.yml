services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-chatapp}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    image: ghcr.io/ajit766/multiuser-chat-user-service:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: users_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    image: ghcr.io/ajit766/multiuser-chat-auth-service:latest
    restart: unless-stopped
    environment:
      USER_SERVICE_URL: http://user-service:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
    depends_on:
      - user-service

  message-service:
    image: ghcr.io/ajit766/multiuser-chat-message-service:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: messages_db
      RABBITMQ_USER: ${RABBITMQ_USER:-chatapp}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      GATEWAY_SERVICE_URL: http://gateway-service:8000
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  presence-service:
    image: ghcr.io/ajit766/multiuser-chat-presence-service:latest
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      PRESENCE_TTL_SECONDS: ${PRESENCE_TTL_SECONDS:-90}
    depends_on:
      redis:
        condition: service_healthy

  gateway-service:
    image: ghcr.io/ajit766/multiuser-chat-gateway-service:latest
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      PRESENCE_SERVICE_URL: http://presence-service:8000
      MESSAGE_SERVICE_URL: http://message-service:8000
    depends_on:
      - presence-service
      - message-service

  delivery-service:
    image: ghcr.io/ajit766/multiuser-chat-delivery-service:latest
    restart: unless-stopped
    environment:
      RABBITMQ_USER: ${RABBITMQ_USER:-chatapp}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PRESENCE_SERVICE_URL: http://presence-service:8000
      GATEWAY_SERVICE_URL: http://gateway-service:8000
      MESSAGE_SERVICE_URL: http://message-service:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy
      presence-service:
        condition: service_started
      gateway-service:
        condition: service_started
      message-service:
        condition: service_started

  nginx:
    image: ghcr.io/ajit766/multiuser-chat-nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - user-service
      - message-service
      - gateway-service

volumes:
  postgres_data:
